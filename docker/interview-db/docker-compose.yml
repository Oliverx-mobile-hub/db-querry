name: interview-db

services:
  mysql:
    image: mysql:8.4
    container_name: interview-db-mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required in .env}"
      MYSQL_DATABASE: interview_db
      MYSQL_USER: interview_reader
      MYSQL_PASSWORD: "${MYSQL_READER_PASSWORD:?MYSQL_READER_PASSWORD is required in .env}"
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    volumes:
      - interview_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  interview_db_data:
    name: interview-db-data
